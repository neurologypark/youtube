name: Collect Comments

on:
  workflow_dispatch:
    inputs:
      max_comments:
        description: '한 번에 가져올 댓글 수'
        required: false
        default: '20'

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client anthropic

      - name: Fetch comments
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          MAX_COMMENTS: ${{ inputs.max_comments }}
        run: python scripts/fetch.py

      - name: Draft replies
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/draft.py

      - name: Build dashboard data
        run: python scripts/build.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data.json
          if git diff --staged --quiet; then
            echo "변경 사항 없음"
          else
            git commit -m "댓글 수집 + AI 초안 갱신 [skip ci]"
            git push
          fi
